<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSC Candidate CRM — Login</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#EDE8DE;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;overflow:hidden;width:100%;max-width:400px;box-shadow:0 4px 32px rgba(30,45,78,.15)}
.hd{background:#1E2D4E;padding:24px 28px;display:flex;align-items:center;gap:14px}
.hd-logo{width:48px;height:48px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#C0272D;flex-shrink:0;letter-spacing:.5px}
.hd-title{color:#fff;font-size:17px;font-weight:800}
.hd-sub{color:rgba(255,255,255,.38);font-size:9.5px;letter-spacing:.08em;margin-top:3px;text-transform:uppercase}
.body{padding:28px}
.welcome{font-size:22px;font-weight:800;color:#1E2D4E;margin-bottom:4px}
.desc{font-size:12px;color:#999;margin-bottom:26px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#888;margin-bottom:6px}
.fg input{width:100%;font-size:14px;padding:11px 14px;border:1.5px solid #e0ddd8;border-radius:9px;background:#F9F7F4;color:#1E2D4E;transition:border .15s,background .15s;font-family:inherit}
.fg input:focus{outline:none;border-color:#1E2D4E;background:#fff}
.fg input.err{border-color:#C0272D;background:#FFF5F5}
.field-err{font-size:10px;color:#C0272D;margin-top:4px;display:none}
.field-err.show{display:block}
.foot{display:flex;justify-content:flex-end;margin-bottom:18px}
.forgot{font-size:11.5px;color:#C9952A;cursor:pointer;background:none;border:none;font-family:inherit;padding:0}
.forgot:hover{text-decoration:underline}
.submit-btn{width:100%;background:#1E2D4E;color:#fff;border:none;padding:13px;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit}
.submit-btn:hover{background:#162340}
.submit-btn:disabled{opacity:.5;cursor:not-allowed}
.spinner{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;animation:spin .6s linear infinite;display:inline-block;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.login-err{font-size:11.5px;color:#C0272D;background:#FFF5F5;border:1px solid #f5c6c8;border-radius:7px;padding:9px 12px;text-align:center;margin-top:12px;display:none}
.login-err.show{display:block}
.note{text-align:center;font-size:9.5px;color:#ccc;margin-top:14px}
</style>
</head>
<body>

<div class="card">
  <div class="hd">
    <div class="hd-logo">BSC</div>
    <div>
      <div class="hd-title">Candidate Portal</div>
      <div class="hd-sub">BSC The Textile Mall · Since 1938</div>
    </div>
  </div>
  <div class="body">
    <div class="welcome">Welcome back</div>
    <div class="desc">Sign in to access the HR portal</div>
    <div class="fg">
      <label for="li-user">Username / Email</label>
      <input type="text" id="li-user" placeholder="your@email.com"
             autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()">
      <div class="field-err" id="err-user">Please enter your username</div>
    </div>
    <div class="fg">
      <label for="li-pass">Password</label>
      <input type="password" id="li-pass" placeholder="••••••••••"
             autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      <div class="field-err" id="err-pass">Please enter your password</div>
    </div>
    <div class="foot">
      <button class="forgot" onclick="forgotPass()">Forgot password?</button>
    </div>
    <button class="submit-btn" id="li-btn" onclick="doLogin()">
      <span id="li-text">Sign In</span>
      <span id="li-spin" class="spinner" style="display:none"></span>
    </button>
    <div class="login-err" id="login-err">Incorrect username or password. Please try again.</div>
    <div class="note">Authorised personnel only · Access is logged</div>
  </div>
</div>

<script>
'use strict';

// ── Use localStorage (not sessionStorage) — persists across page navigations ──
const SESSION_KEY = 'bsc_crm_session';
const SCRIPT_URL  = 'https://script.google.com/macros/s/AKfycbwolTclzyP2skiQi4ndcPs4y4z0s0gRglN0fUK3jmBq-w8RAxBUltcw47QqyjGGRF-3/exec';

const ROLE_HOME = {
  'HR':           'dashboard.html',
  'Floor Manager':'interview-panel.html',
  'Manager':      'interview-panel.html',
  'Admin':        'dashboard.html'
};

// ── Clear any stale redirect flag ──
localStorage.removeItem('_redirecting');

// ── Redirect if already logged in ──
try {
  const existing = JSON.parse(localStorage.getItem(SESSION_KEY));
  if (existing && existing.role) {
    window.location.replace(ROLE_HOME[existing.role] || 'dashboard.html');
  }
} catch(e) {
  localStorage.removeItem(SESSION_KEY);
}

function el(id){ return document.getElementById(id); }

function doLogin() {
  const username = el('li-user').value.trim();
  const password = el('li-pass').value;

  el('err-user').classList.remove('show'); el('li-user').classList.remove('err');
  el('err-pass').classList.remove('show'); el('li-pass').classList.remove('err');
  el('login-err').classList.remove('show');

  let hasErr = false;
  if (!username){ el('err-user').classList.add('show'); el('li-user').classList.add('err'); hasErr=true; }
  if (!password){ el('err-pass').classList.add('show'); el('li-pass').classList.add('err'); hasErr=true; }
  if (hasErr) return;

  const btn = el('li-btn');
  btn.disabled = true;
  el('li-text').textContent = 'Signing in…';
  el('li-spin').style.display = '';

  verifyUser(username, password).then(result => {
    if (result.success) {
      // Save to localStorage — survives page navigation
      localStorage.setItem(SESSION_KEY, JSON.stringify({
        username: result.displayName || username,
        role:     result.role,
        loginAt:  Date.now()
      }));
      window.location.replace(ROLE_HOME[result.role] || 'dashboard.html');
    } else {
      throw new Error('invalid');
    }
  }).catch(() => {
    el('login-err').classList.add('show');
    el('li-pass').classList.add('err');
    el('li-pass').value = '';
    el('li-pass').focus();
    btn.disabled = false;
    el('li-text').textContent = 'Sign In';
    el('li-spin').style.display = 'none';
  });
}

async function verifyUser(username, password) {
  if (!SCRIPT_URL || SCRIPT_URL.includes('YOUR_SCRIPT_ID')) {
    return demoVerify(username, password);
  }
  try {
    const res = await fetch(SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify({ action:'verifyUser', username, password })
    });
    const data = await res.json();
    return data.success ? data : demoVerify(username, password);
  } catch(e) {
    return demoVerify(username, password);
  }
}

const DEMO_USERS = [
  { username:'hr@bsctextiles.com',          password:'bsc@2026', role:'HR',           displayName:'HR Admin'    },
  { username:'fm@bsctextiles.com',           password:'bsc@2026', role:'Floor Manager', displayName:'Floor Manager'},
  { username:'manager@bsctextiles.com',      password:'bsc@2026', role:'Manager',       displayName:'Store Manager'},
  { username:'admin@bsctextiles.com',        password:'bsc@2026', role:'Admin',         displayName:'Admin'       },
];
function demoVerify(username, password) {
  const u = DEMO_USERS.find(d =>
    d.username.toLowerCase() === username.toLowerCase() && d.password === password
  );
  return Promise.resolve(u
    ? { success:true, role:u.role, displayName:u.displayName }
    : { success:false }
  );
}

function forgotPass() {
  alert('Please contact your system administrator to reset your password.\n\nEmail: admin@bsctextiles.com');
}
</script>
</body>
</html>
